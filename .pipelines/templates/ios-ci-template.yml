steps:
- task: CocoaPods@0
  displayName: 'Installing dependency via pod'
  inputs:
    workingDirectory: 'source/ios/AdaptiveCards'
    forceRepoUpdate: false

- script: |
    set -eo pipefail
    cd source/ios/AdaptiveCards

    # Find an available simulator or use generic destination
    SIM=$(xcrun simctl list devices available --json 2>/dev/null | python3 -c "
    import json, sys
    try:
      devices = json.load(sys.stdin)['devices']
      for runtime in sorted(devices.keys(), reverse=True):
        if 'iOS' in runtime:
          for d in devices[runtime]:
            if 'iPhone' in d['name'] and d.get('isAvailable', False):
              print(d['udid']); sys.exit(0)
    except: pass
    " 2>/dev/null || true)

    if [ -n "$SIM" ]; then
      DEST="platform=iOS Simulator,id=$SIM"
      echo "Using simulator: $SIM"
    else
      DEST="generic/platform=iOS Simulator"
      echo "No simulator found, using generic destination"
    fi

    echo "Destination: $DEST"
    xcodebuild test       -workspace AdaptiveCards.xcworkspace       -scheme ADCIOSVisualizer       -sdk iphonesimulator       -destination "$DEST"       CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO       | xcpretty -r junit --no-color
  displayName: 'Sample App Unit Test'

