steps:
- task: CocoaPods@0
  displayName: 'Installing dependency via pod'
  inputs:
    workingDirectory: 'source/ios/AdaptiveCards'
    forceRepoUpdate: false

- script: |
    set -e
    SIM_NAME=$(xcrun simctl list devices available --json | python3 -c "
    import json, sys
    devices = json.load(sys.stdin)['devices']
    for runtime in sorted(devices.keys(), reverse=True):
      if 'iOS' in runtime:
        for d in devices[runtime]:
          if 'iPhone' in d['name'] and d.get('isAvailable', False):
            print(d['name']); sys.exit(0)
    sys.exit(1)
    ")
    echo "Discovered simulator: $SIM_NAME"
    echo "##vso[task.setvariable variable=SimulatorName]$SIM_NAME"
  displayName: 'Discover available iOS Simulator'

- task: Xcode@5
  displayName: 'Sample App Unit Test'
  inputs:
    actions: 'test'
    xcWorkspacePath: 'source/ios/AdaptiveCards/AdaptiveCards.xcworkspace'
    scheme: 'ADCIOSVisualizer'
    xcodeVersion: 'default'
    packageApp: false
    signingOption: 'default'
    sdk: 'iphonesimulator'
    destinationPlatformOption: 'custom'
    destinationSimulators: 'platform=iOS Simulator,OS=latest,name=$(SimulatorName)'

- task: Xcode@5
  displayName: 'Framework Unit Test'
  inputs:
    actions: 'test'
    xcWorkspacePath: 'source/ios/AdaptiveCards/AdaptiveCards.xcworkspace'
    scheme: 'AdaptiveCards'
    xcodeVersion: 'default'
    packageApp: false
    signingOption: 'default'
    sdk: 'iphonesimulator'
    destinationPlatformOption: 'custom'
    destinationSimulators: 'platform=iOS Simulator,OS=latest,name=$(SimulatorName)'
