steps:
- task: CocoaPods@0
  displayName: 'Installing dependency via pod'
  inputs:
    workingDirectory: 'source/ios/AdaptiveCards'
    forceRepoUpdate: false

- script: |
    echo "=== Available Xcode versions ==="
    ls /Applications/ | grep Xcode
    echo "=== Current Xcode ==="
    xcode-select -p
    echo "=== Available runtimes ==="
    xcrun simctl list runtimes
    echo "=== Available devices ==="
    xcrun simctl list devices available | head -30
  displayName: 'Debug: List available simulators'

- task: Xcode@5
  displayName: 'Sample App Unit Test'
  inputs:
    actions: 'test'
    xcWorkspacePath: 'source/ios/AdaptiveCards/AdaptiveCards.xcworkspace'
    scheme: 'ADCIOSVisualizer'
    xcodeVersion: 'default'
    packageApp: false
    signingOption: 'default'
    sdk: 'iphonesimulator18.5'
    destinationPlatformOption: 'iOS'
    destinationSimulators: 'iPhone 16'

- task: Xcode@5
  displayName: 'Framework Unit Test'
  inputs:
    actions: 'test'
    xcWorkspacePath: 'source/ios/AdaptiveCards/AdaptiveCards.xcworkspace'
    scheme: 'AdaptiveCards'
    xcodeVersion: 'default'
    packageApp: false
    signingOption: 'default'
    sdk: 'iphonesimulator18.5'
    destinationPlatformOption: 'iOS'
    destinationSimulators: 'iPhone 16'
